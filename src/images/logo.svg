<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="200" height="133.33">
  <!-- Background circle with stars -->
  <defs>
    <radialGradient id="bgGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#2d1b4e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a0f2e;stop-opacity:1" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer circle -->
  <circle cx="300" cy="200" r="180" fill="url(#bgGradient)" stroke="#d4a853" stroke-width="8"/>
  
  <!-- Stars scattered around -->
  <text x="150" y="80" font-size="24" fill="#d4a853">✨</text>
  <text x="420" y="100" font-size="20" fill="#d4a853">✨</text>
  <text x="480" y="200" font-size="18" fill="#d4a853">✨</text>
  <text x="450" y="320" font-size="22" fill="#d4a853">✨</text>
  <text x="120" y="300" font-size="20" fill="#d4a853">✨</text>
  <text x="100" y="180" font-size="18" fill="#d4a853">✨</text>
  
  <!-- Moon crescent -->
  <path d="M 130 100 Q 110 120 130 140" stroke="#d4a853" stroke-width="6" fill="none" stroke-linecap="round"/>
  
  <!-- Cupcake -->
  <g transform="translate(200, 100)">
    <!-- Wrapper -->
    <path d="M 0 20 L -15 40 L 15 40 Z" fill="#9333ea"/>
    <!-- Cup lines -->
    <line x1="-12" y1="25" x2="-10" y2="38" stroke="#d4a853" stroke-width="1"/>
    <line x1="0" y1="23" x2="0" y2="40" stroke="#d4a853" stroke-width="1"/>
    <line x1="12" y1="25" x2="10" y2="38" stroke="#d4a853" stroke-width="1"/>
    
    <!-- Frosting -->
    <ellipse cx="0" cy="15" rx="20" ry="16" fill="#ff69b4"/>
    <!-- Frosting swirl -->
    <circle cx="-8" cy="8" r="3" fill="#fbbf24"/>
    <circle cx="8" cy="8" r="3" fill="#fbbf24"/>
    <circle cx="0" cy="12" r="2" fill="#fbbf24"/>
    <!-- Eyes -->
    <circle cx="-6" cy="12" r="2" fill="#1a1a1a"/>
    <circle cx="6" cy="12" r="2" fill="#1a1a1a"/>
    <!-- Smile -->
    <path d="M -4 16 Q 0 18 4 16" stroke="#1a1a1a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Star on top -->
    <polygon points="0,-8 2,-2 8,-1 3,3 4,9 0,6 -4,9 -3,3 -8,-1 -2,-2" fill="#d4a853"/>
  </g>
  
  <!-- Donut -->
  <g transform="translate(380, 120)">
    <circle cx="0" cy="0" r="18" fill="#8b4513" stroke="#d4a853" stroke-width="2"/>
    <circle cx="0" cy="0" r="8" fill="#2d1b4e"/>
    <!-- Glaze spots -->
    <circle cx="-8" cy="-6" r="3" fill="#ff69b4"/>
    <circle cx="6" cy="-8" r="3" fill="#ff69b4"/>
    <circle cx="8" cy="6" r="2.5" fill="#fbbf24"/>
  </g>
  
  <!-- Text: "Miraculous" -->
  <text x="300" y="240" font-family="serif" font-size="48" font-weight="bold" text-anchor="middle" fill="#d4a853" stroke="#1a0f2e" stroke-width="2" letter-spacing="2">Miraculous</text>
  
  <!-- Text: "Munchies" -->
  <text x="300" y="290" font-family="serif" font-size="48" font-weight="bold" text-anchor="middle" fill="#ff69b4" stroke="#d4a853" stroke-width="1" letter-spacing="1">Munchies</text>
  
  <!-- Decorative swirl at bottom -->
  <path d="M 200 310 Q 300 330 400 310" stroke="#9333ea" stroke-width="4" fill="none" stroke-linecap="round"/>
</svg>
